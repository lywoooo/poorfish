<svg xmlns="http://www.w3.org/2000/svg" width="900" height="390" viewBox="0 0 900 390" role="img" aria-labelledby="title desc">
  <title id="title">Controlled self-play results against V1 Baseline</title>
  <desc id="desc">Stacked bar chart showing wins, draws, and losses over 250 paired-position games for V4, V7, and V8 against V1 Baseline.</desc>
  <rect width="900" height="390" fill="#f8fafc"/>
  <text x="40" y="46" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">Controlled self-play vs V1 Baseline</text>
  <text x="40" y="74" font-family="Arial, sans-serif" font-size="14" fill="#475569">250 games per matchup. 125 balanced FEN starts, each played with colors swapped.</text>

  <rect x="40" y="100" width="14" height="14" fill="#2563eb"/>
  <text x="62" y="112" font-family="Arial, sans-serif" font-size="13" fill="#334155">Wins</text>
  <rect x="125" y="100" width="14" height="14" fill="#94a3b8"/>
  <text x="147" y="112" font-family="Arial, sans-serif" font-size="13" fill="#334155">Draws</text>
  <rect x="215" y="100" width="14" height="14" fill="#ef4444"/>
  <text x="237" y="112" font-family="Arial, sans-serif" font-size="13" fill="#334155">Losses</text>

  <g font-family="Arial, sans-serif" font-size="14" fill="#111827">
    <text x="40" y="154" font-weight="700">V4 TranspositionTable</text>
    <rect x="210" y="134" width="384" height="28" rx="4" fill="#2563eb"/>
    <rect x="594" y="134" width="194.4" height="28" rx="0" fill="#94a3b8"/>
    <rect x="788.4" y="134" width="21.6" height="28" rx="4" fill="#ef4444"/>
    <text x="604" y="153" fill="#111827">160 W / 81 D / 9 L</text>
    <text x="825" y="153" font-weight="700">80.2%</text>

    <text x="40" y="214" font-weight="700">V8 Endgame</text>
    <rect x="210" y="194" width="345.6" height="28" rx="4" fill="#2563eb"/>
    <rect x="555.6" y="194" width="189.6" height="28" rx="0" fill="#94a3b8"/>
    <rect x="745.2" y="194" width="64.8" height="28" rx="4" fill="#ef4444"/>
    <text x="565" y="213" fill="#111827">144 W / 79 D / 27 L</text>
    <text x="825" y="213" font-weight="700">73.4%</text>

    <text x="40" y="274" font-weight="700">V7 Mobility</text>
    <rect x="210" y="254" width="333.6" height="28" rx="4" fill="#2563eb"/>
    <rect x="543.6" y="254" width="196.8" height="28" rx="0" fill="#94a3b8"/>
    <rect x="740.4" y="254" width="69.6" height="28" rx="4" fill="#ef4444"/>
    <text x="553" y="273" fill="#111827">139 W / 82 D / 29 L</text>
    <text x="825" y="273" font-weight="700">72.0%</text>
  </g>

  <line x1="210" y1="318" x2="810" y2="318" stroke="#cbd5e1"/>
  <g font-family="Arial, sans-serif" font-size="12" fill="#64748b">
    <text x="205" y="342">0</text>
    <text x="442" y="342">100</text>
    <text x="682" y="342">200</text>
    <text x="796" y="342">250</text>
  </g>
  <text x="40" y="365" font-family="Arial, sans-serif" font-size="12" fill="#64748b">V9 omitted here because the opening book was not used from random FEN starts.</text>
</svg>
