<svg xmlns="http://www.w3.org/2000/svg" width="900" height="390" viewBox="0 0 900 390" role="img" aria-labelledby="title desc">
  <title id="title">Game termination breakdown</title>
  <desc id="desc">Stacked bar chart showing decisive games, threefold repetition draws, and other draws in controlled 250-game experiments.</desc>
  <rect width="900" height="390" fill="#f8fafc"/>
  <text x="40" y="46" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">How the controlled games ended</text>
  <text x="40" y="74" font-family="Arial, sans-serif" font-size="14" fill="#475569">Decisive results increased, but repetition draws still make up a large part of the test set.</text>

  <rect x="40" y="100" width="14" height="14" fill="#16a34a"/>
  <text x="62" y="112" font-family="Arial, sans-serif" font-size="13" fill="#334155">Decisive</text>
  <rect x="140" y="100" width="14" height="14" fill="#f59e0b"/>
  <text x="162" y="112" font-family="Arial, sans-serif" font-size="13" fill="#334155">Threefold repetition</text>
  <rect x="310" y="100" width="14" height="14" fill="#94a3b8"/>
  <text x="332" y="112" font-family="Arial, sans-serif" font-size="13" fill="#334155">Other draws</text>

  <g font-family="Arial, sans-serif" font-size="14" fill="#111827">
    <text x="40" y="154" font-weight="700">V4 TranspositionTable</text>
    <rect x="210" y="134" width="405.6" height="28" rx="4" fill="#16a34a"/>
    <rect x="615.6" y="134" width="177.6" height="28" fill="#f59e0b"/>
    <rect x="793.2" y="134" width="16.8" height="28" rx="4" fill="#94a3b8"/>
    <text x="625" y="153" fill="#111827">169 decisive / 74 repetition</text>

    <text x="40" y="214" font-weight="700">V8 Endgame</text>
    <rect x="210" y="194" width="410.4" height="28" rx="4" fill="#16a34a"/>
    <rect x="620.4" y="194" width="177.6" height="28" fill="#f59e0b"/>
    <rect x="798" y="194" width="12" height="28" rx="4" fill="#94a3b8"/>
    <text x="630" y="213" fill="#111827">171 decisive / 74 repetition</text>

    <text x="40" y="274" font-weight="700">V7 Mobility</text>
    <rect x="210" y="254" width="403.2" height="28" rx="4" fill="#16a34a"/>
    <rect x="613.2" y="254" width="182.4" height="28" fill="#f59e0b"/>
    <rect x="795.6" y="254" width="14.4" height="28" rx="4" fill="#94a3b8"/>
    <text x="623" y="273" fill="#111827">168 decisive / 76 repetition</text>
  </g>

  <line x1="210" y1="318" x2="810" y2="318" stroke="#cbd5e1"/>
  <g font-family="Arial, sans-serif" font-size="12" fill="#64748b">
    <text x="205" y="342">0</text>
    <text x="442" y="342">100</text>
    <text x="682" y="342">200</text>
    <text x="796" y="342">250</text>
  </g>
  <text x="40" y="365" font-family="Arial, sans-serif" font-size="12" fill="#64748b">Other draws include fifty-move, insufficient-material, and max-move outcomes.</text>
</svg>
