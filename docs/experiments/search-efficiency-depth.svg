<svg xmlns="http://www.w3.org/2000/svg" width="900" height="410" viewBox="0 0 900 410" role="img" aria-labelledby="title desc">
  <title id="title">Search efficiency and depth in controlled self-play</title>
  <desc id="desc">Bar chart comparing average nodes per move and average search depth for V4, V7, and V8, with baseline values from the same runs.</desc>
  <rect width="900" height="410" fill="#f8fafc"/>
  <text x="40" y="46" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">Search efficiency in the controlled runs</text>
  <text x="40" y="74" font-family="Arial, sans-serif" font-size="14" fill="#475569">Optimized versions reached deeper searches while visiting fewer nodes per move than baseline in the same batches.</text>

  <rect x="40" y="100" width="14" height="14" fill="#64748b"/>
  <text x="62" y="112" font-family="Arial, sans-serif" font-size="13" fill="#334155">V1 Baseline from same run</text>
  <rect x="250" y="100" width="14" height="14" fill="#2563eb"/>
  <text x="272" y="112" font-family="Arial, sans-serif" font-size="13" fill="#334155">Compared version</text>

  <g font-family="Arial, sans-serif" font-size="13" fill="#111827">
    <text x="40" y="154" font-weight="700">V4 TranspositionTable</text>
    <rect x="210" y="137" width="271" height="16" rx="3" fill="#64748b"/>
    <rect x="210" y="161" width="193" height="16" rx="3" fill="#2563eb"/>
    <text x="492" y="151">63k nodes, depth 3.43</text>
    <text x="414" y="175">45k nodes, depth 4.47</text>

    <text x="40" y="224" font-weight="700">V8 Endgame</text>
    <rect x="210" y="207" width="281" height="16" rx="3" fill="#64748b"/>
    <rect x="210" y="231" width="148" height="16" rx="3" fill="#2563eb"/>
    <text x="502" y="221">66k nodes, depth 3.45</text>
    <text x="369" y="245">34k nodes, depth 4.16</text>

    <text x="40" y="294" font-weight="700">V7 Mobility</text>
    <rect x="210" y="277" width="298" height="16" rx="3" fill="#64748b"/>
    <rect x="210" y="301" width="160" height="16" rx="3" fill="#2563eb"/>
    <text x="519" y="291">70k nodes, depth 3.54</text>
    <text x="381" y="315">37k nodes, depth 4.27</text>
  </g>

  <line x1="210" y1="346" x2="510" y2="346" stroke="#cbd5e1"/>
  <g font-family="Arial, sans-serif" font-size="12" fill="#64748b">
    <text x="204" y="370">0</text>
    <text x="293" y="370">20k</text>
    <text x="383" y="370">40k</text>
    <text x="473" y="370">60k</text>
  </g>
  <text x="40" y="393" font-family="Arial, sans-serif" font-size="12" fill="#64748b">Node bars use per-move averages from each matchup's ply log; depth is shown as text.</text>
</svg>
